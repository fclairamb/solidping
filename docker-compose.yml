services:
  postgres:
    image: postgres:18.3
    container_name: solidping-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "55432:5432"
    volumes:
      #- postgres_data:/var/lib/postgresql
      - ./docker-compose/scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    image: oven/bun:1.3.11
    container_name: solidping-dashboard
    working_dir: /app
    command: sh -c "bun install && bun dev --host 0.0.0.0 --base /dashboard/"
    ports:
      - "5173:5173"
    volumes:
      - ./web/dashboard:/app
      - dashboard_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    stop_grace_period: 1s

  server:
    image: golang:1.26.2-trixie
    container_name: solidping-server
    working_dir: /app
    command: sh -c "go install github.com/air-verse/air@v1.63.4 && air -c .air.toml"
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - go_modules:/go/pkg/mod
    environment:
      - SP_DB_TYPE=postgres
      - SP_DB_URL=postgres://solidping:solidping@postgres:5432/solidping?sslmode=disable
      - SP_AUTH_JWT_SECRET=dev-secret-change-in-production
      - SP_SERVER_LISTEN=:4000
      - SP_SERVER_JOB_RUNNERS=1
      - SP_REDIRECTS=/dashboard:dashboard:5173/dashboard
    depends_on:
      postgres:
        condition: service_healthy
    stop_grace_period: 1s

volumes:
  dashboard_node_modules:
  go_modules:
