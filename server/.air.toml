# Air configuration for hot reloading
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
# Build command
cmd = "go build -o ./tmp/solidping ."
# Binary to run
bin = "./tmp/solidping"
# Extra arguments for binary
args_bin = ["serve"]
# Full command with environment variables
full_bin = "SP_REDIRECTS='/dash0:localhost:5174/dash0,/status0:localhost:5175/status0' ./tmp/solidping serve"
# Watch these file extensions
include_ext = ["go"]
# Exclude directories
exclude_dir = ["tmp", "vendor", ".git", "testdata", "res", "apps", "openapi"]
# Exclude files
exclude_file = []
# Exclude regex patterns
exclude_regex = ["_test.go$"]
# Exclude unchanged files
exclude_unchanged = false
# Follow symlinks
follow_symlink = false
# Log file location
log = "tmp/air.log"
# Kill delay (ms) - wait before killing the process
kill_delay = "500ms"
# Send interrupt signal before kill
send_interrupt = true
# Delay before re-running after change (ms)
delay = 1000
# On build failure, keep running the previous good binary (tmp/solidping is
# unchanged because `go build -o` does not overwrite on error). Air still
# kills the running process before invoking the build (see engine.go:431) —
# this only governs whether the old binary is relaunched after a failed build.
stop_on_error = false

[log]
# Show timestamp in logs
time = true
# Log only main logs (no build output)
main_only = false

[color]
# Customize colors
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Delete tmp directory on exit
clean_on_exit = true
