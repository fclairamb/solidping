{{template "base.html" .}}
{{define "content"}}
<div class="content">
    <h2>Check Alert: {{.CheckName}}</h2>
    <p>Status: <span class="status-{{.Status}}">{{.Status | upper}}</span></p>
    <p>{{.Message}}</p>
    {{if .DashboardURL}}
    <p><a href="{{.DashboardURL}}" class="button">View Dashboard</a></p>
    {{end}}
</div>
{{end}}
