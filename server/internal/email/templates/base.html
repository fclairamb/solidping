<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 0 auto; background-color: #ffffff; }
        .header { background: #1a1a2e; color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; }
        .content { padding: 20px; background: #ffffff; }
        .footer { padding: 20px; color: #666; font-size: 12px; text-align: center; background-color: #f9f9f9; }
        .button { display: inline-block; padding: 12px 24px; background: #dc3545; color: white; text-decoration: none; border-radius: 4px; }
        .button-success { background: #28a745; }
        .status-down { color: #dc3545; font-weight: bold; }
        .status-up { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SolidPing</h1>
        </div>
        {{block "content" .}}{{end}}
        <div class="footer">
            <p>This is an automated message from SolidPing.</p>
        </div>
    </div>
</body>
</html>
