<!doctype html>
<html>
    <head>
        <title>SolidPing API Reference</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            body {
                margin: 0;
                padding: 0;
            }
        </style>
    </head>

    <body>
        <script
            id="api-reference"
            data-url="/openapi.yaml"
            data-configuration='{
        "theme": "purple",
        "layout": "modern",
        "defaultHttpClient": {
          "targetKey": "shell",
          "clientKey": "curl"
        },
        "hiddenClients": [],
        "authentication": {
          "preferredSecurityScheme": "bearerAuth"
        }
      }'
        ></script>
        <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    </body>
</html>
